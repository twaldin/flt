name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bun test tests/unit/
      - run: bun test tests/integration/
