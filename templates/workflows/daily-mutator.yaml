name: daily-mutator
auto_pr: false
steps:
  - id: collect
    run: |
      mkdir -p "$FLT_RUN_DIR/artifacts"
      flt trace recent --since 24h --status failed > "$FLT_RUN_DIR/artifacts/trace-bundle.txt" 2>/dev/null \
        || echo "flt trace not available — bundle empty" > "$FLT_RUN_DIR/artifacts/trace-bundle.txt"
    on_complete: redact
    on_fail: abort

  - id: redact
    run: |
      sed -E \
        -e 's/sk-[A-Za-z0-9_-]+/<REDACTED:OPENAI_KEY>/g' \
        -e 's/ghp_[A-Za-z0-9]+/<REDACTED:GH_TOKEN>/g' \
        -e 's/github_pat_[A-Za-z0-9_]+/<REDACTED:GH_PAT>/g' \
        -e 's/AKIA[A-Z0-9]+/<REDACTED:AWS_KEY>/g' \
        -e 's/(API_KEY|AUTH_TOKEN|BEARER)[ =:]+[^[:space:]"]+/\1=<REDACTED:ENV>/g' \
        -e 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/<REDACTED:EMAIL>/g' \
        -e 's/[A-Za-z0-9_-]{32,}/<REDACTED:LONG_TOKEN>/g' \
        "$FLT_RUN_DIR/artifacts/trace-bundle.txt" \
        > "$FLT_RUN_DIR/artifacts/trace-bundle-redacted.txt"
    on_complete: find_skills
    on_fail: abort

  - id: find_skills
    run: |
      mkdir -p "$FLT_RUN_DIR/artifacts"
      KEYWORDS=$(printf '%s' {task} | tr 'A-Z ' 'a-z\n' | grep -E '^[a-z0-9-]{3,}$' | head -3 | xargs)
      if [ -n "$KEYWORDS" ]; then
        npx --yes skills find $KEYWORDS > "$FLT_RUN_DIR/artifacts/skill-candidates.txt" 2>&1 || true
      else
        echo "no keywords extracted from task" > "$FLT_RUN_DIR/artifacts/skill-candidates.txt"
      fi
      true
    on_complete: mutate
    on_fail: abort

  - id: mutate
    type: parallel
    n: 6
    presets: [cc-mutator, cc-mutator, cc-mutator, cc-mutator, cc-mutator, cc-mutator]
    step:
      id: mutate-child
      preset: cc-mutator
      dir: /Users/twaldin/flt
      worktree: true
      task: |
        You are a per-domain GEPA mutator. Map your $FLT_RUN_LABEL to one role file:
          a -> templates/roles/coder.md
          b -> templates/roles/reviewer.md
          c -> templates/roles/architect.md
          d -> templates/roles/oracle.md
          e -> templates/roles/mutator.md
          f -> templates/roles/evaluator.md
        If your label is anything else, flt workflow fail "unmapped label: $FLT_RUN_LABEL".
        Inputs:
        - $FLT_RUN_DIR/artifacts/trace-bundle-redacted.txt
        - $FLT_RUN_DIR/artifacts/skill-candidates.txt
        - Focus area: {task}
        Required outputs in $FLT_RUN_DIR/artifacts/ (label-scoped, must not collide):
        1) <role>-$FLT_RUN_LABEL.vNext.md with YAML front-matter (stable_path absolute, mutation_type: prompt_edit | skill_acquisition), then full proposed body.
        2) <role>-$FLT_RUN_LABEL.hypothesis.json shape: { artifact, mutation_type, hypothesis, expected_delta }.
        Rules: one candidate per child; stable_path absolute; do not edit the stable file in place.
        flt workflow pass when both files exist with label-scoped names.
        flt workflow fail "<reason>" only if you cannot mutate at all.
    on_complete: eval
    on_fail: abort

  - id: eval
    type: parallel
    n: 2
    # treatment_map: { a: stable, b: candidate }
    presets: [pi-coder, pi-coder]
    step:
      id: eval-child
      preset: pi-coder
      dir: /Users/twaldin/flt
      worktree: true
      task: |
        Evaluate treatment $FLT_RUN_LABEL of the candidate.
        a = stable, b = candidate.

        Inputs:
        - $FLT_RUN_DIR/artifacts/*.hypothesis.json (one per candidate)
        - $FLT_RUN_DIR/artifacts/*.vNext.md (one per candidate)

        Write output to a path the engine will not overwrite. The engine
        writes its own verdict to results/eval-$FLT_RUN_LABEL.json after
        the agent exits — write your output to .output.txt to preserve it.

        Run:
        flt eval suite run default > "$FLT_RUN_DIR/results/eval-$FLT_RUN_LABEL.output.txt" 2>&1 || \
          (bun test > "$FLT_RUN_DIR/results/eval-$FLT_RUN_LABEL.output.txt" 2>&1)

        Then write a structured score file the review step + flt promote
        can consume — at minimum a numeric score per axis:
        cat > "$FLT_RUN_DIR/results/eval-$FLT_RUN_LABEL.scores.json" <<JSON
        {"scores": {"eval_pass": 1}}
        JSON

        flt workflow pass when both .output.txt and .scores.json are written.
        flt workflow fail "eval did not run" only if neither command can execute.
    on_complete: review
    on_fail: abort

  # Per-candidate review via flt ask human. One chained TUI flow with one
  # question per *.vNext.md, each carrying the inline diff vs stable + the
  # mutator's hypothesis + 3 options: approve / reject / modify. modify
  # opens $EDITOR on the vNext and re-asks for approve/reject. Approved
  # candidates are auto-promoted via flt promote.
  - id: review
    run: |
      set -euo pipefail
      RUN_ID=$(basename "$FLT_RUN_DIR")
      export ART="$FLT_RUN_DIR/artifacts"
      export RUN_ID
      export FLT_TEMPLATES_DIR="${FLT_TEMPLATES_DIR:-$HOME/flt/templates}"

      # First pass: ask the user about each candidate
      JSON=$(node -e '
        const fs = require("fs"), child = require("child_process");
        const art = process.env.ART;
        const tplDir = process.env.FLT_TEMPLATES_DIR;
        const cands = fs.readdirSync(art).filter(f => f.endsWith(".vNext.md")).sort();
        if (cands.length === 0) { process.stderr.write("no candidates in " + art + "\n"); process.exit(2); }
        const questions = cands.map(f => {
          const slug = f.replace(/\.vNext\.md$/, "");
          const role = slug.split("-")[0];
          const stable = `${tplDir}/roles/${role}.md`;
          const candPath = `${art}/${f}`;
          let diff = "";
          try { diff = child.execSync(`diff -u "${stable}" "${candPath}" 2>/dev/null || true`).toString(); }
          catch (e) { diff = "(diff failed: " + e.message + ")"; }
          let hyp = "";
          try {
            const h = JSON.parse(fs.readFileSync(`${art}/${slug}.hypothesis.json`, "utf8"));
            hyp = `Hypothesis: ${h.hypothesis}\n\nExpected delta: ${JSON.stringify(h.expected_delta, null, 2)}\n\n`;
          } catch {}
          return {
            id: `mutate-${slug}`,
            header: `${slug} — approve / reject / modify?`,
            question: `${hyp}Diff vs stable (${stable}):\n\n${diff}`,
            multiSelect: false,
            options: [
              { label: "approve", description: "promote this vNext as the new stable role" },
              { label: "reject",  description: "discard this candidate, do not promote" },
              { label: "modify",  description: "open vNext.md in $EDITOR, then re-ask approve/reject" },
            ],
          };
        });
        console.log(JSON.stringify({ questions }));
      ')

      echo "$JSON" | flt ask human --run-id "$RUN_ID" > "$ART/review-answers-1.json"

      # Process answers; for modify, open editor + re-ask single approve/reject
      APPROVED=$(node -e '
        const fs = require("fs"), child = require("child_process");
        const art = process.env.ART;
        const tplDir = process.env.FLT_TEMPLATES_DIR;
        const RUN_ID = process.env.RUN_ID;
        const editor = process.env.EDITOR || "vim";
        const a1 = JSON.parse(fs.readFileSync(`${art}/review-answers-1.json`, "utf8"));
        const approved = [];
        const reAskQs = [];
        const slugByQid = {};
        for (const ans of a1.answers || []) {
          const slug = ans.questionId.replace(/^mutate-/, "");
          const choice = (ans.selected || [])[0];
          if (choice === "approve") {
            approved.push(slug);
          } else if (choice === "modify") {
            const file = `${art}/${slug}.vNext.md`;
            child.execSync(`${editor} "${file}"`, { stdio: "inherit" });
            const role = slug.split("-")[0];
            const stable = `${tplDir}/roles/${role}.md`;
            let diff = "";
            try { diff = child.execSync(`diff -u "${stable}" "${file}" 2>/dev/null || true`).toString(); }
            catch (e) { diff = "(diff failed)"; }
            const qid = `mutate-${slug}-modified`;
            slugByQid[qid] = slug;
            reAskQs.push({
              id: qid,
              header: `${slug} (modified) — approve?`,
              question: `Modified diff vs stable (${stable}):\n\n${diff}`,
              multiSelect: false,
              options: [
                { label: "approve", description: "promote modified version" },
                { label: "reject",  description: "discard modified version" },
              ],
            });
          }
        }
        if (reAskQs.length > 0) {
          const payload = JSON.stringify({ questions: reAskQs });
          const out = child.execSync(`flt ask human --run-id "${RUN_ID}"`, { input: payload }).toString();
          fs.writeFileSync(`${art}/review-answers-2.json`, out);
          const a2 = JSON.parse(out);
          for (const ans of a2.answers || []) {
            const choice = (ans.selected || [])[0];
            if (choice === "approve") approved.push(slugByQid[ans.questionId]);
          }
        }
        process.stdout.write(approved.join(" "));
      ')

      if [ -z "$APPROVED" ]; then
        echo "no candidates approved — nothing to promote"
      else
        for slug in $APPROVED; do
          flt promote "$ART/${slug}.vNext.md" --evidence "$RUN_ID" || \
            echo "WARN: promote failed for $slug" >&2
        done
      fi
    on_complete: done
    on_fail: review
