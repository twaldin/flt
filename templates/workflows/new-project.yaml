name: new-project
steps:
  - id: grill
    preset: cc-sonnet
    task: |
      Original task: {task}
      Read the task above. Identify any genuine ambiguities or scope decisions a coder will need clarified to deliver an unambiguous implementation. Skip questions whose answer is obvious from the task. Cap at 3 questions. If the task is unambiguous, skip the call and write 'No clarifications needed.' to grill-answers.md.
      If you do have questions, build a single batch payload (Question objects in one array) and call:
        flt ask human '<json>'
      The json must contain a 'questions' array with all your questions in one shot — do NOT call ask human multiple times. Each Question must have: id (short kebab-case), header (one-line), question (full prompt), multiSelect (boolean), options (array of {label, description?}). Pre-author concrete options so the user picks rather than typing.
      After the call returns, write all Q&A to grill-answers.md in your worktree (one ## section per question with the user's chosen answer).
      flt workflow pass when grill-answers.md exists.
    on_complete: research
  - id: research
    preset: cc-sonnet
    task: |
      Original task: {task}

      Read {steps.grill.worktree}/grill-answers.md to learn the user's preferences.

      Write research.md in your worktree covering best-practice stack + gotchas
      for this task. Sections:
      - Recommended stack/framework (1-line reason each, respect grill answers)
      - Common gotchas / anti-patterns to avoid
      - 2-3 reference projects, libraries, or doc URLs worth reading

      Use your own knowledge first. If you want a second opinion on a specific
      sub-question, fire `flt ask oracle "<focused question>"` — its answer
      will arrive in your tmux feed, paste relevant bits into research.md.
      Cap oracle queries at 2.

      flt workflow pass when research.md is written.
    on_complete: spec
  - id: spec
    preset: cc-sonnet
    task: |
      Read {steps.grill.worktree}/grill-answers.md FIRST and treat the user's answers as binding.
      Read {steps.research.worktree}/research.md for stack/gotchas context.
      Write spec.md for: {task}.
    on_complete: architect
  - id: architect
    preset: cc-opus
    dir: '{steps.spec.worktree}'
    worktree: false
    task: 'Read spec.md; produce design.md.'
    on_complete: coder
  - id: coder
    preset: pi-coder
    task: |
      Implement per {steps.architect.worktree}/design.md.

      Previous-attempt feedback (only set on retry): {fail_reason}

      flt workflow pass when tests are green and committed.
    on_complete: reviewer
    on_fail: coder
    max_retries: 2
  - id: reviewer
    preset: pi-reviewer
    dir: '{steps.coder.worktree}'
    worktree: false
    task: |
      Review the coder's diff against {steps.spec.worktree}/spec.md and {steps.architect.worktree}/design.md.

      flt workflow pass if acceptable, flt workflow fail "<concrete actionable feedback>" otherwise.
      The coder retry receives your fail message verbatim — be specific.
    on_complete: verifier
    on_fail: coder
  - id: verifier
    preset: pi-coder
    dir: '{steps.coder.worktree}'
    worktree: false
    task: |
      Run tests + lint.

      Previous-verifier feedback (only set on retry): {fail_reason}

      flt workflow pass on green.
    on_complete: gate
    on_fail: coder
  - id: gate
    type: human_gate
    notify: 'New project initial cut ready for human review.'
    on_complete: done
    on_fail: coder
