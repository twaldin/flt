name: dynamic-feature
# Generic feature workflow on top of dynamic_dag: architect decomposes the task
# into a plan.json (with real depends_on chains, not just leaves), a dag of
# coder+reviewer pairs runs each node, the reconciler merges the integration
# branch and runs tests, then a final pr step opens a PR. Second production
# dogfood of dynamic_dag — first one (gepa-prep) had only independent leaves.
steps:
  - id: plan
    preset: cc-architect
    task: |
      Decompose this feature into a parallel-execution plan.json.

      Task: {task}

      ## Path discipline (read first — last dogfood corrupted the project root)
      Each per-node task you write will be sent to a coder agent that runs in
      its OWN git worktree (a temp dir, NOT the user's project root). DO NOT
      embed absolute paths or "Project root: ..." hints in node tasks.
      Reference files by their REPO-RELATIVE path only (e.g. "src/gates.ts",
      "tests/unit/foo.test.ts"). The coder will resolve those relative to its
      worktree's cwd.

      ## Template-var literal preservation (read second — caused 2 dogfood failures)
      The engine substitutes {task}, {fail_reason}, {steps.<id>.worktree}, {pr},
      and {steps.<id>.<field>} once per resolveTemplate pass. Your task body is
      resolved once before you read it. The per-node task you produce is then
      resolved a second time when the coder bootstrap is built. So a single
      {task} in your per-node task ends up substituted in the coder's view —
      they never see {task} as a literal.

      When the coder needs to WRITE a literal placeholder into a generated yaml
      (e.g. a daily-mutator step body that contains `Original task: {task}` as
      its OWN runtime placeholder), DOUBLE the braces in your per-node task:

        write `Original task: {{task}}` literally into the file.

      Engine resolves {{X}} → {X} on every pass. So `{{task}}` in your task
      becomes `{task}` in the coder's view, which they paste verbatim into
      yaml. The generated yaml then has `{task}` for its own runtime to resolve.

      ## Retry context (always include in per-node tasks)
      Always include these two literal lines in every per-node `task` body so
      retries after a reviewer-fail get the previous failure feedback:

        Previous-attempt feedback (only set on retry): {fail_reason}

        On retry, if the env var $FLT_RETRY_REVIEW_PATH points at a file
        that exists, READ THAT FILE FIRST — it is the previous reviewer's
        full handoff with detailed blockers, supersedes the one-line
        {fail_reason} above. Engine sets this var only on retry.

      The engine plumbs reviewer fail messages into {fail_reason} automatically
      on retry; coders ignore both lines on the first attempt.

      Output a plan.json file in your worktree's root with this shape:
      {
        "default_preset": "<one of the presets below>",
        "nodes": [
          {
            "id": "<short-slug>",
            "preset": "<optional override per node>",
            "task": "<self-contained instructions for one coder agent>",
            "depends_on": ["<other-node-id>", ...]
          }
        ]
      }

      ## Preset menu (pick per node based on task shape)

      - pi-coder       — pi/gpt-5.3-codex. **Default coder.** Fast,
                         cheap, good at focused fixes and mechanical
                         edits. Use this unless a specific reason below
                         applies.
      - codex-coder    — codex/gpt-5.3-codex. Same model family, different
                         CLI; useful when you want ensemble diversity
                         inside one dag.
      - gemini-coder   — gemini/2.5-pro. Best when a node needs to read
                         lots of context (large refactors across many
                         files, big API surface scans).
      - opencode-coder — opencode/default. Lighter alternative.
      - cc-coder       — claude-code/sonnet. **Last resort.** Only when
                         the node genuinely needs claude-code-specific
                         judgment (subtle multi-file naming/structure
                         decisions, dense type-system work). Costs more.

      Default policy: pi-coder for every node unless there's a stated
      reason it won't work. cc-coder requires justification in the node
      task ("needs cc because <reason>"). Reviewer preset is fixed by
      the engine (pi-reviewer / gpt-5.5) and you don't pick it.

      Rules:
      - Each node should be a self-contained unit one coder can complete.
      - Use depends_on to express real dependencies (e.g., a CLI module that
        imports a data module). Independent nodes will run in parallel;
        dependent nodes wait for their deps to pass.
      - Keep nodes small: 50-300 LOC each is the sweet spot. If a node would
        be much bigger, split it.
      - Each node task MUST specify exact file paths to create/edit, plus
        the test files (TDD: write tests first, watch them fail, then code).
      - Each node task MUST end with: "flt workflow pass when tests are green
        and your handoff is written to $FLT_RUN_DIR/handoffs/$FLT_AGENT_NAME.md
        (do NOT write coder.md inside the worktree — that ends up in the diff)."
      - Each per-node task MUST end with a verbatim "## Common gotchas"
        footer that points coders at templates/gotchas.md. Use this text:

          ## Common gotchas
          Read `templates/gotchas.md` in your worktree before signaling
          pass — it lists Python→TS pitfalls, git-commit hygiene, TS
          strictness, and test-baseline rules. Skipping these costs a
          full retry cycle.

      Aim for 3-6 nodes total. Don't over-fragment — too many tiny nodes
      multiplies orchestration overhead and reconciler conflict surface.

      flt workflow pass when plan.json is written and validates against the
      schema above.
    on_complete: execute
    on_fail: abort

  - id: execute
    type: dynamic_dag
    plan_from: '{steps.plan.worktree}/plan.json'
    reconciler:
      preset: cc-evaluator
      task: |
        Merge each leaf node's branch into the integration branch in topo
        order (deps before dependents). Resolve any conflicts by preferring
        the version that keeps tests green.

        After all merges land, run the project's full test suite (bun test
        / npm test / pytest — discover from the project files) on the
        integration branch.

        ## CRITICAL: pre-existing vs new failures
        If any test fails:
        1. Re-run the same suite on main (git stash; git checkout main;
           run tests; git checkout -; git stash pop).
        2. Diff main's failures vs integration's. PRE-EXISTING failures (fail
           on main too) are NOT regressions — note them but don't block.
        3. NEW failures (passed on main, fail on integration) ARE blocking.

        flt workflow pass when no NEW failures.
        flt workflow fail "<short reason naming any new failures>" otherwise.
    node_max_retries: 2
    max_nodes: 8
    max_depth: 3
    on_complete: pr
    on_fail: abort

  - id: pr
    # Mechanical: push integration branch + open PR. No LLM needed.
    # Removes one agent spawn (cost) and one possible failure mode per run.
    dir: '{steps.execute.worktree}'
    worktree: false
    auto_pr_step: true
    run: |
      set -e
      cd "{steps.execute.worktree}"

      # Build PR title from the first non-empty line of the task, capped at 70 chars.
      TITLE=$(printf '%s' "{task}" | awk 'NF{print; exit}' | cut -c1-70)
      if [ -z "$TITLE" ]; then TITLE="Workflow PR (run $FLT_RUN_ID)"; fi

      # Build PR body by concatenating per-node coder.md handoffs.
      BODY_FILE="$FLT_RUN_DIR/artifacts/pr-body.md"
      mkdir -p "$FLT_RUN_DIR/artifacts"
      {
        echo "## Summary"
        echo
        echo "Workflow run \`$FLT_RUN_ID\` — auto-opened PR for the integration branch."
        echo
        echo "## Original task"
        echo
        echo '```'
        printf '%s' "{task}" | head -c 2000
        echo
        echo '```'
        echo
        echo "## Per-node handoffs"
        echo
        for f in "$FLT_RUN_DIR"/handoffs/*-coder.md; do
          [ -f "$f" ] || continue
          NODE=$(basename "$f" .md)
          echo "### $NODE"
          echo
          cat "$f"
          echo
        done
      } > "$BODY_FILE"

      git push -u origin HEAD
      gh pr create --base main --title "$TITLE" --body-file "$BODY_FILE" | tee "$FLT_RUN_DIR/artifacts/pr-url.txt"
    on_complete: done
    on_fail: abort
